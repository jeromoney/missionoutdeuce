  <script>
    // Capture console.error calls so integration tests can assert on them.
    window.__smokeTestErrors = [];
    const _origError = window.console.error.bind(window.console);
    window.console.error = function() {
      window.__smokeTestErrors.push(Array.from(arguments).join(' '));
      _origError.apply(window.console, arguments);
    };
  </script>
