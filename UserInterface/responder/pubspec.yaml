name: missionout_responder
description: MissionOut responder app with Flutter web support
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  http: ^1.5.0
  intl: any
  timeago: ^3.7.0
  shared_auth:
    path: ../shared_auth
  shared_models:
    path: ../shared_models
  shared_theme:
    path: ../shared_theme
  shared_previews:
    path: ../shared_previews
  firebase_auth: ^6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
